# API Deployment with Auto-scaling and High Availability
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pwc-retail-api
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pwc-retail-platform
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: kubernetes
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pwc-retail-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pwc-retail-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: pwc-retail-platform
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        co.elastic.logs/enabled: "true"
        co.elastic.logs/processors.dissect.tokenizer: "%{timestamp} %{level} %{message}"
        backup.policy: "standard"
        monitoring.policy: "enhanced"
    spec:
      serviceAccountName: pwc-retail-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values: ["pwc-retail-api"]
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values: ["t3.medium", "t3.large", "c5.large", "c5.xlarge"]
              - key: kubernetes.io/arch
                operator: In
                values: ["amd64"]
      tolerations:
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: pwc-retail-api
      initContainers:
      - name: wait-for-postgres
        image: postgres:15-alpine
        command: ['sh', '-c']
        args:
        - |
          until pg_isready -h postgres-service -p 5432 -U admin; do
            echo "Waiting for postgres..."
            sleep 2
          done
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: pwc-retail-database-secrets
              key: POSTGRES_PASSWORD
      - name: wait-for-redis
        image: redis:7-alpine
        command: ['sh', '-c']
        args:
        - |
          until redis-cli -h redis-service -p 6379 -a "$REDIS_PASSWORD" ping; do
            echo "Waiting for redis..."
            sleep 2
          done
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pwc-retail-redis-secrets
              key: REDIS_PASSWORD
      containers:
      - name: api
        image: ghcr.io/pwc-challenge-dataengineer/api:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        # Configuration from ConfigMap
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: pwc-retail-app-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: pwc-retail-app-config
              key: LOG_LEVEL
        - name: API_HOST
          valueFrom:
            configMapKeyRef:
              name: pwc-retail-app-config
              key: API_HOST
        - name: API_PORT
          valueFrom:
            configMapKeyRef:
              name: pwc-retail-app-config
              key: API_PORT
        - name: WORKERS
          valueFrom:
            configMapKeyRef:
              name: pwc-retail-app-config
              key: WORKERS
        - name: ENABLE_MONITORING
          valueFrom:
            configMapKeyRef:
              name: pwc-retail-app-config
              key: ENABLE_MONITORING
        - name: ENABLE_CACHING
          valueFrom:
            configMapKeyRef:
              name: pwc-retail-app-config
              key: ENABLE_CACHING
        - name: PROCESSING_ENGINE
          valueFrom:
            configMapKeyRef:
              name: pwc-retail-app-config
              key: PROCESSING_ENGINE
        # Secrets
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: pwc-retail-database-secrets
              key: DATABASE_URL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: pwc-retail-app-secrets
              key: SECRET_KEY
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: pwc-retail-redis-secrets
              key: REDIS_URL
        - name: DATADOG_API_KEY
          valueFrom:
            secretKeyRef:
              name: pwc-retail-app-secrets
              key: DATADOG_API_KEY
        - name: BASIC_AUTH_USERNAME
          valueFrom:
            secretKeyRef:
              name: pwc-retail-app-secrets
              key: BASIC_AUTH_USERNAME
        - name: BASIC_AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pwc-retail-app-secrets
              key: BASIC_AUTH_PASSWORD
        # Kubernetes-specific environment variables
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: KUBERNETES_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: KUBERNETES_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: KUBERNETES_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "1Gi"
            cpu: "500m"
            ephemeral-storage: "2Gi"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 3000
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /api/v1/health/startup
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: cache-volume
          mountPath: /app/cache
        - name: logs-volume
          mountPath: /app/logs
        - name: data-volume
          mountPath: /app/data
          readOnly: true
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      volumes:
      - name: tmp-volume
        emptyDir:
          sizeLimit: 100Mi
      - name: cache-volume
        emptyDir:
          sizeLimit: 500Mi
      - name: logs-volume
        emptyDir:
          sizeLimit: 1Gi
      - name: data-volume
        persistentVolumeClaim:
          claimName: pwc-retail-data-pvc
      - name: config-volume
        configMap:
          name: pwc-retail-app-config
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: pwc-retail-api-service
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pwc-retail-platform
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: LoadBalancer
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app.kubernetes.io/name: pwc-retail-api
    app.kubernetes.io/component: api

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pwc-retail-api-hpa
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pwc-retail-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pwc-retail-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max

---
# Vertical Pod Autoscaler (Optional)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: pwc-retail-api-vpa
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pwc-retail-platform
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pwc-retail-api
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: api
      maxAllowed:
        cpu: 2
        memory: 4Gi
      minAllowed:
        cpu: 100m
        memory: 256Mi
      controlledResources: ["cpu", "memory"]

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pwc-retail-api-pdb
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pwc-retail-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pwc-retail-api
      app.kubernetes.io/component: api

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pwc-retail-api-sa
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pwc-retail-platform
  annotations:
    # AWS IAM Role for Service Accounts (IRSA)
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/pwc-retail-api-role
    # Azure Workload Identity
    azure.workload.identity/client-id: "REPLACE_WITH_AZURE_CLIENT_ID"
    # Google Workload Identity
    iam.gke.io/gcp-service-account: pwc-retail-api@PROJECT_ID.iam.gserviceaccount.com
automountServiceAccountToken: true

---
# Network Policy for Security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pwc-retail-api-netpol
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pwc-retail-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pwc-retail-api
      app.kubernetes.io/component: api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9090
  egress:
  # Allow DNS
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow HTTPS
  - to: []
    ports:
    - protocol: TCP
      port: 443
  # Allow database connections
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: postgresql
    ports:
    - protocol: TCP
      port: 5432
  # Allow Redis connections
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow messaging connections
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: rabbitmq
    ports:
    - protocol: TCP
      port: 5672
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: kafka
    ports:
    - protocol: TCP
      port: 9092