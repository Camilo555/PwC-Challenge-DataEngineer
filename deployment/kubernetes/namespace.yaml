# Multi-Environment Namespace Configuration
apiVersion: v1
kind: Namespace
metadata:
  name: pwc-retail-data-platform-dev
  labels:
    name: pwc-retail-data-platform-dev
    environment: development
    project: pwc-retail-platform
    managed-by: terraform
    cost-center: data-engineering
    team: data-platform
  annotations:
    description: "Development namespace for PwC Retail Data Platform"
    contact: "data-engineering-team@pwc.com"
    compliance: "gdpr,ccpa"
    backup-policy: "standard"
    auto-scaling: "enabled"
---
apiVersion: v1
kind: Namespace
metadata:
  name: pwc-retail-data-platform-staging
  labels:
    name: pwc-retail-data-platform-staging
    environment: staging
    project: pwc-retail-platform
    managed-by: terraform
    cost-center: data-engineering
    team: data-platform
  annotations:
    description: "Staging namespace for PwC Retail Data Platform"
    contact: "data-engineering-team@pwc.com"
    compliance: "gdpr,ccpa"
    backup-policy: "enhanced"
    auto-scaling: "enabled"
---
apiVersion: v1
kind: Namespace
metadata:
  name: pwc-retail-data-platform-prod
  labels:
    name: pwc-retail-data-platform-prod
    environment: production
    project: pwc-retail-platform
    managed-by: terraform
    cost-center: data-engineering
    team: data-platform
  annotations:
    description: "Production namespace for PwC Retail Data Platform"
    contact: "data-engineering-team@pwc.com"
    compliance: "gdpr,ccpa,sox,pci-dss"
    backup-policy: "critical"
    auto-scaling: "enabled"
---
# Resource Quotas for Cost Control
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pwc-retail-quota-dev
  namespace: pwc-retail-data-platform-dev
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    pods: "20"
    services: "10"
    secrets: "20"
    configmaps: "20"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pwc-retail-quota-staging
  namespace: pwc-retail-data-platform-staging
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "20"
    pods: "40"
    services: "15"
    secrets: "30"
    configmaps: "30"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pwc-retail-quota-prod
  namespace: pwc-retail-data-platform-prod
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    persistentvolumeclaims: "50"
    pods: "100"
    services: "30"
    secrets: "50"
    configmaps: "50"
---
# Network Policies for Security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pwc-retail-network-policy
  namespace: pwc-retail-data-platform-prod
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: pwc-retail-data-platform-prod
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: pwc-retail-platform
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector:
        matchLabels:
          name: pwc-retail-data-platform-prod