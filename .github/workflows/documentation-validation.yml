name: Documentation Validation and Quality Control

on:
  push:
    branches: [ main, develop ]
    paths: 
      - 'docs/**/*.md'
      - '*.md'
      - 'README.md'
      - '.github/workflows/documentation-validation.yml'
  pull_request:
    branches: [ main, develop ]
    paths: 
      - 'docs/**/*.md'
      - '*.md'
      - 'README.md'
      - '.github/workflows/documentation-validation.yml'
  schedule:
    # Run weekly documentation health check
    - cron: '0 2 * * 1'

jobs:
  markdown-validation:
    name: Validate Markdown Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install markdownlint
        run: |
          npm install -g markdownlint-cli2
          npm install -g markdown-link-check

      - name: Create markdownlint config
        run: |
          cat > .markdownlint.json << 'EOF'
          {
            "default": true,
            "MD013": false,
            "MD033": false,
            "MD041": false,
            "MD024": {
              "allow_different_nesting": true
            }
          }
          EOF

      - name: Lint markdown files
        run: |
          markdownlint-cli2 "**/*.md" "#node_modules" "#.git"

      - name: Check markdown links
        run: |
          find . -name "*.md" -not -path "./node_modules/*" -not -path "./.git/*" | xargs -I {} markdown-link-check {} --config .github/workflows/markdown-link-check.json

  spell-check:
    name: Spell Check Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install cspell
        run: npm install -g cspell

      - name: Create cspell config
        run: |
          cat > cspell.json << 'EOF'
          {
            "version": "0.2",
            "language": "en",
            "words": [
              "pwc", "datadog", "supabase", "postgresql", "redis", "kafka", "rabbitmq",
              "dbt", "airflow", "terraform", "kubernetes", "mlops", "etl", "api",
              "graphql", "fastapi", "pydantic", "sqlalchemy", "alembic", "pytest",
              "cicd", "dockerfile", "yaml", "json", "mermaid", "plantuml",
              "observability", "tracing", "prometheus", "grafana", "elasticsearch",
              "logstash", "kibana", "oauth", "jwt", "rbac", "gdpr", "hipaa",
              "microservices", "containerization", "orchestration", "medallion",
              "dataframe", "numpy", "pandas", "scikit", "tensorflow", "pytorch",
              "camilo", "github", "dependabot", "codecov", "sonarcloud"
            ],
            "flagWords": [],
            "ignorePaths": [
              "node_modules/**",
              ".git/**",
              "*.log",
              "*.lock"
            ],
            "overrides": [
              {
                "filename": "**/*.md",
                "languageSettings": [
                  {
                    "languageId": "markdown",
                    "ignoreRegExpList": [
                      "/```[\\s\\S]*?```/g",
                      "/`[^`]*`/g",
                      "/\\[.*?\\]\\(.*?\\)/g",
                      "/https?:\\/\\/[^\\s)]+/g"
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Run spell check
        run: |
          cspell "**/*.md" --no-progress --show-context --show-suggestions

  documentation-freshness:
    name: Check Documentation Freshness
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyYAML requests

      - name: Create freshness checker
        run: |
          cat > check_docs_freshness.py << 'EOF'
          #!/usr/bin/env python3
          """
          Documentation freshness checker.
          Identifies documentation that may be outdated based on code changes.
          """
          
          import os
          import subprocess
          import datetime
          from pathlib import Path
          import json
          
          def get_file_last_modified(filepath):
              """Get the last modification date of a file from git."""
              try:
                  result = subprocess.run(
                      ['git', 'log', '-1', '--format=%ct', '--', filepath],
                      capture_output=True, text=True, check=True
                  )
                  if result.stdout.strip():
                      timestamp = int(result.stdout.strip())
                      return datetime.datetime.fromtimestamp(timestamp)
                  return None
              except (subprocess.CalledProcessError, ValueError):
                  return None
          
          def check_documentation_freshness():
              """Check if documentation is fresh compared to related code changes."""
              warnings = []
              
              # Define documentation to code mappings
              doc_mappings = {
                  'docs/api/': ['src/api/', 'src/core/'],
                  'docs/data-engineering/': ['src/etl/', 'dbt/'],
                  'docs/architecture/': ['src/', 'terraform/'],
                  'docs/operations/': ['terraform/', 'infrastructure/'],
                  'docs/monitoring/': ['src/monitoring/', 'infrastructure/monitoring/'],
                  'docs/security/': ['src/security/', 'terraform/modules/security/']
              }
              
              for doc_path, code_paths in doc_mappings.items():
                  if not os.path.exists(doc_path):
                      continue
                      
                  # Find all markdown files in doc directory
                  doc_files = list(Path(doc_path).rglob('*.md'))
                  
                  for doc_file in doc_files:
                      doc_modified = get_file_last_modified(str(doc_file))
                      if not doc_modified:
                          continue
                      
                      # Check related code files
                      for code_path in code_paths:
                          if not os.path.exists(code_path):
                              continue
                              
                          code_files = []
                          for ext in ['*.py', '*.sql', '*.yml', '*.yaml', '*.tf']:
                              code_files.extend(Path(code_path).rglob(ext))
                          
                          for code_file in code_files[:10]:  # Limit to avoid too many checks
                              code_modified = get_file_last_modified(str(code_file))
                              if code_modified and code_modified > doc_modified:
                                  days_diff = (code_modified - doc_modified).days
                                  if days_diff > 30:  # Flag if code changed more than 30 days after doc
                                      warnings.append({
                                          'doc_file': str(doc_file),
                                          'code_file': str(code_file),
                                          'days_outdated': days_diff,
                                          'doc_modified': doc_modified.isoformat(),
                                          'code_modified': code_modified.isoformat()
                                      })
              
              return warnings
          
          def main():
              warnings = check_documentation_freshness()
              
              if warnings:
                  print("⚠️  Documentation freshness warnings found:")
                  for warning in warnings:
                      print(f"  📄 {warning['doc_file']}")
                      print(f"     Related code: {warning['code_file']}")
                      print(f"     Documentation is {warning['days_outdated']} days outdated")
                      print()
                  
                  # Save warnings for later use
                  with open('doc_freshness_warnings.json', 'w') as f:
                      json.dump(warnings, f, indent=2)
                  
                  print(f"Found {len(warnings)} documentation freshness warnings.")
                  print("Consider reviewing and updating the affected documentation.")
              else:
                  print("✅ All documentation appears to be fresh!")
          
          if __name__ == '__main__':
              main()
          EOF

      - name: Check documentation freshness
        run: python check_docs_freshness.py

      - name: Upload freshness report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: documentation-freshness-report
          path: doc_freshness_warnings.json
          if-no-files-found: ignore

  structure-validation:
    name: Validate Documentation Structure
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Create structure validator
        run: |
          cat > validate_docs_structure.py << 'EOF'
          #!/usr/bin/env python3
          """
          Documentation structure validator.
          Ensures consistent documentation organization and required files.
          """
          
          import os
          from pathlib import Path
          import re
          
          def check_required_sections(file_path):
              """Check if markdown file has required sections."""
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read()
              except UnicodeDecodeError:
                  return []
              
              missing_sections = []
              
              # Check for common required sections based on file type
              if 'README.md' in str(file_path):
                  required_sections = [
                      r'#.*overview|#.*description',
                      r'#.*installation|#.*setup|#.*getting started',
                      r'#.*usage|#.*examples'
                  ]
                  section_names = ['Overview/Description', 'Installation/Setup', 'Usage/Examples']
              elif 'API' in str(file_path).upper():
                  required_sections = [
                      r'#.*authentication',
                      r'#.*endpoints|#.*routes',
                      r'#.*examples'
                  ]
                  section_names = ['Authentication', 'Endpoints', 'Examples']
              else:
                  return []  # Skip validation for other files
              
              for section_pattern, section_name in zip(required_sections, section_names):
                  if not re.search(section_pattern, content, re.IGNORECASE | re.MULTILINE):
                      missing_sections.append(section_name)
              
              return missing_sections
          
          def validate_links_format(file_path):
              """Validate markdown link formats."""
              issues = []
              
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read()
              except UnicodeDecodeError:
                  return issues
              
              # Check for malformed links
              malformed_links = re.findall(r'\[([^\]]*)\]\([^)]*\s[^)]*\)', content)
              if malformed_links:
                  issues.append(f"Malformed links with spaces: {malformed_links}")
              
              # Check for missing link text
              empty_links = re.findall(r'\[\s*\]\([^)]+\)', content)
              if empty_links:
                  issues.append(f"Links with empty text: {empty_links}")
              
              return issues
          
          def main():
              errors = []
              warnings = []
              
              # Find all markdown files
              md_files = list(Path('.').rglob('*.md'))
              
              print(f"📊 Validating {len(md_files)} markdown files...")
              
              for md_file in md_files:
                  # Skip certain directories
                  if any(skip in str(md_file) for skip in ['.git', 'node_modules', 'venv']):
                      continue
                  
                  # Check required sections
                  missing_sections = check_required_sections(md_file)
                  if missing_sections:
                      warnings.append(f"{md_file}: Missing sections - {', '.join(missing_sections)}")
                  
                  # Check link formats
                  link_issues = validate_links_format(md_file)
                  if link_issues:
                      errors.extend([f"{md_file}: {issue}" for issue in link_issues])
              
              # Report results
              if errors:
                  print("❌ Structure validation errors found:")
                  for error in errors:
                      print(f"  {error}")
                  print()
              
              if warnings:
                  print("⚠️  Structure validation warnings:")
                  for warning in warnings:
                      print(f"  {warning}")
                  print()
              
              if not errors and not warnings:
                  print("✅ Documentation structure validation passed!")
              
              # Exit with error code if there are critical errors
              if errors:
                  exit(1)
          
          if __name__ == '__main__':
              main()
          EOF

      - name: Validate documentation structure
        run: python validate_docs_structure.py

  generate-metrics:
    name: Generate Documentation Metrics
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install matplotlib seaborn

      - name: Create metrics generator
        run: |
          cat > generate_docs_metrics.py << 'EOF'
          #!/usr/bin/env python3
          """
          Documentation metrics generator.
          Generates comprehensive metrics about documentation quality and coverage.
          """
          
          import os
          import re
          from pathlib import Path
          import json
          from collections import defaultdict
          
          def analyze_markdown_file(file_path):
              """Analyze a single markdown file for metrics."""
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read()
              except UnicodeDecodeError:
                  return None
              
              # Count various elements
              metrics = {
                  'file_path': str(file_path),
                  'word_count': len(content.split()),
                  'line_count': len(content.splitlines()),
                  'heading_count': len(re.findall(r'^#{1,6}\s', content, re.MULTILINE)),
                  'code_block_count': len(re.findall(r'```', content)) // 2,
                  'inline_code_count': len(re.findall(r'`[^`]+`', content)),
                  'link_count': len(re.findall(r'\[([^\]]+)\]\([^)]+\)', content)),
                  'image_count': len(re.findall(r'!\[([^\]]*)\]\([^)]+\)', content)),
                  'table_count': len(re.findall(r'\|.*\|', content)),
                  'list_item_count': len(re.findall(r'^[\s]*[-*+]\s', content, re.MULTILINE)),
                  'has_toc': bool(re.search(r'table.{0,10}content', content, re.IGNORECASE)),
                  'readability_score': calculate_readability_score(content)
              }
              
              return metrics
          
          def calculate_readability_score(content):
              """Calculate a simple readability score."""
              # Remove code blocks and markdown formatting
              clean_content = re.sub(r'```.*?```', '', content, flags=re.DOTALL)
              clean_content = re.sub(r'`[^`]+`', '', clean_content)
              clean_content = re.sub(r'[#*_`\[\]()]+', '', clean_content)
              
              words = clean_content.split()
              if not words:
                  return 0
              
              # Simple metrics for readability
              avg_word_length = sum(len(word) for word in words) / len(words)
              sentences = re.split(r'[.!?]+', clean_content)
              avg_sentence_length = len(words) / max(len(sentences), 1)
              
              # Simple readability score (lower is better)
              score = min(100, max(0, 100 - (avg_word_length * 5) - (avg_sentence_length * 2)))
              return round(score, 1)
          
          def generate_documentation_report():
              """Generate comprehensive documentation metrics report."""
              md_files = list(Path('.').rglob('*.md'))
              md_files = [f for f in md_files if not any(skip in str(f) for skip in ['.git', 'node_modules', 'venv'])]
              
              all_metrics = []
              category_stats = defaultdict(lambda: defaultdict(list))
              
              for md_file in md_files:
                  metrics = analyze_markdown_file(md_file)
                  if metrics:
                      all_metrics.append(metrics)
                      
                      # Categorize by directory
                      category = str(md_file).split(os.sep)[0] if os.sep in str(md_file) else 'root'
                      for key, value in metrics.items():
                          if isinstance(value, (int, float)):
                              category_stats[category][key].append(value)
              
              # Generate summary statistics
              total_files = len(all_metrics)
              total_words = sum(m['word_count'] for m in all_metrics)
              total_lines = sum(m['line_count'] for m in all_metrics)
              avg_readability = sum(m['readability_score'] for m in all_metrics) / total_files if total_files > 0 else 0
              
              # Find top files by various metrics
              top_by_words = sorted(all_metrics, key=lambda x: x['word_count'], reverse=True)[:5]
              top_by_readability = sorted(all_metrics, key=lambda x: x['readability_score'], reverse=True)[:5]
              
              report = {
                  'generated_at': '2025-09-02T00:00:00Z',
                  'summary': {
                      'total_files': total_files,
                      'total_words': total_words,
                      'total_lines': total_lines,
                      'average_readability_score': round(avg_readability, 1),
                      'total_code_blocks': sum(m['code_block_count'] for m in all_metrics),
                      'total_links': sum(m['link_count'] for m in all_metrics),
                      'files_with_toc': sum(1 for m in all_metrics if m['has_toc'])
                  },
                  'top_files_by_words': [
                      {'file': m['file_path'], 'words': m['word_count']} 
                      for m in top_by_words
                  ],
                  'top_files_by_readability': [
                      {'file': m['file_path'], 'score': m['readability_score']} 
                      for m in top_by_readability
                  ],
                  'category_breakdown': {
                      category: {
                          'file_count': len(stats['word_count']),
                          'avg_words': round(sum(stats['word_count']) / len(stats['word_count']), 1) if stats['word_count'] else 0,
                          'avg_readability': round(sum(stats['readability_score']) / len(stats['readability_score']), 1) if stats['readability_score'] else 0
                      }
                      for category, stats in category_stats.items()
                  },
                  'detailed_metrics': all_metrics
              }
              
              return report
          
          def main():
              print("📊 Generating documentation metrics...")
              
              report = generate_documentation_report()
              
              # Save detailed report
              with open('docs_metrics_report.json', 'w') as f:
                  json.dump(report, f, indent=2)
              
              # Print summary
              summary = report['summary']
              print(f"✅ Documentation metrics generated!")
              print(f"   📁 Total files: {summary['total_files']}")
              print(f"   📝 Total words: {summary['total_words']:,}")
              print(f"   📊 Average readability: {summary['average_readability_score']}/100")
              print(f"   🔗 Total links: {summary['total_links']}")
              print(f"   📋 Files with TOC: {summary['files_with_toc']}")
              
              print("\n📈 Top files by word count:")
              for file_info in report['top_files_by_words']:
                  print(f"   • {file_info['file']}: {file_info['words']} words")
          
          if __name__ == '__main__':
              main()
          EOF

      - name: Generate documentation metrics
        run: python generate_docs_metrics.py

      - name: Upload metrics report
        uses: actions/upload-artifact@v3
        with:
          name: documentation-metrics-report
          path: docs_metrics_report.json

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [markdown-validation, spell-check, documentation-freshness, structure-validation, generate-metrics]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Generate validation summary
        run: |
          echo "# Documentation Validation Summary" > validation_summary.md
          echo "" >> validation_summary.md
          echo "Generated on: $(date)" >> validation_summary.md
          echo "" >> validation_summary.md
          
          # Check job results
          echo "## Job Results" >> validation_summary.md
          echo "- Markdown Validation: ${{ needs.markdown-validation.result }}" >> validation_summary.md
          echo "- Spell Check: ${{ needs.spell-check.result }}" >> validation_summary.md
          echo "- Documentation Freshness: ${{ needs.documentation-freshness.result }}" >> validation_summary.md
          echo "- Structure Validation: ${{ needs.structure-validation.result }}" >> validation_summary.md
          echo "- Metrics Generation: ${{ needs.generate-metrics.result }}" >> validation_summary.md
          echo "" >> validation_summary.md
          
          # Add metrics if available
          if [ -f "artifacts/documentation-metrics-report/docs_metrics_report.json" ]; then
            echo "## Documentation Metrics" >> validation_summary.md
            echo "- Total Files: $(jq -r '.summary.total_files' artifacts/documentation-metrics-report/docs_metrics_report.json)" >> validation_summary.md
            echo "- Total Words: $(jq -r '.summary.total_words' artifacts/documentation-metrics-report/docs_metrics_report.json)" >> validation_summary.md
            echo "- Average Readability: $(jq -r '.summary.average_readability_score' artifacts/documentation-metrics-report/docs_metrics_report.json)/100" >> validation_summary.md
          fi

      - name: Upload validation summary
        uses: actions/upload-artifact@v3
        with:
          name: validation-summary
          path: validation_summary.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            
            if (fs.existsSync('validation_summary.md')) {
              const summary = fs.readFileSync('validation_summary.md', 'utf8');
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 📚 Documentation Validation Results\n\n${summary}`
              });
            }