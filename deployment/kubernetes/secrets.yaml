# Secrets Management for Multi-Cloud Data Platform
# Note: In production, use external secret management systems like:
# - AWS Secrets Manager
# - Azure Key Vault
# - Google Secret Manager
# - HashiCorp Vault
# - Kubernetes External Secrets Operator

apiVersion: v1
kind: Secret
metadata:
  name: pwc-retail-app-secrets
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-platform
    app.kubernetes.io/component: secrets
    app.kubernetes.io/version: "1.0.0"
  annotations:
    secret-management: "external-secrets-operator"
    vault-path: "secret/pwc-retail/prod/app"
type: Opaque
stringData:
  # Database Credentials
  DATABASE_URL: "postgresql://admin:REPLACE_WITH_SECURE_PASSWORD@postgres-service:5432/pwc_retail_prod"
  DATABASE_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  DATABASE_USER: "admin"
  
  # Application Secrets
  SECRET_KEY: "REPLACE_WITH_SECURE_SECRET_KEY_32_CHARS_MIN"
  JWT_SECRET: "REPLACE_WITH_SECURE_JWT_SECRET_KEY"
  ENCRYPTION_KEY: "REPLACE_WITH_SECURE_ENCRYPTION_KEY"
  API_KEY: "REPLACE_WITH_SECURE_API_KEY"
  
  # External Service API Keys
  DATADOG_API_KEY: "REPLACE_WITH_DATADOG_API_KEY"
  DATADOG_APP_KEY: "REPLACE_WITH_DATADOG_APP_KEY"
  SLACK_WEBHOOK_URL: "REPLACE_WITH_SLACK_WEBHOOK_URL"
  
  # Cloud Provider Credentials (Use IRSA/Workload Identity in production)
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_AWS_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_AWS_SECRET_KEY"
  AZURE_CLIENT_ID: "REPLACE_WITH_AZURE_CLIENT_ID"
  AZURE_CLIENT_SECRET: "REPLACE_WITH_AZURE_CLIENT_SECRET"
  GOOGLE_APPLICATION_CREDENTIALS: "REPLACE_WITH_GCP_SERVICE_ACCOUNT_JSON"
  
  # External Enrichment APIs
  ENRICHMENT_API_KEY: "REPLACE_WITH_ENRICHMENT_API_KEY"
  GEO_API_KEY: "REPLACE_WITH_GEOLOCATION_API_KEY"
  
  # Messaging Credentials
  RABBITMQ_DEFAULT_USER: "admin"
  RABBITMQ_DEFAULT_PASS: "REPLACE_WITH_SECURE_RABBITMQ_PASSWORD"
  KAFKA_SASL_USERNAME: "admin"
  KAFKA_SASL_PASSWORD: "REPLACE_WITH_SECURE_KAFKA_PASSWORD"
  
  # Search Engine Credentials
  TYPESENSE_API_KEY: "REPLACE_WITH_SECURE_TYPESENSE_API_KEY"
  ELASTICSEARCH_PASSWORD: "REPLACE_WITH_SECURE_ELASTICSEARCH_PASSWORD"
  
  # Basic Auth for Monitoring
  BASIC_AUTH_USERNAME: "admin"
  BASIC_AUTH_PASSWORD: "REPLACE_WITH_SECURE_BASIC_AUTH_PASSWORD"

---
apiVersion: v1
kind: Secret
metadata:
  name: pwc-retail-database-secrets
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-platform
    app.kubernetes.io/component: database-secrets
    app.kubernetes.io/version: "1.0.0"
type: Opaque
stringData:
  POSTGRES_DB: "pwc_retail_prod"
  POSTGRES_USER: "admin"
  POSTGRES_PASSWORD: "REPLACE_WITH_SECURE_DB_PASSWORD"
  POSTGRES_REPLICATION_USER: "replicator"
  POSTGRES_REPLICATION_PASSWORD: "REPLACE_WITH_SECURE_REPLICATION_PASSWORD"
  DATABASE_URL: "postgresql://admin:REPLACE_WITH_SECURE_DB_PASSWORD@postgres-service:5432/pwc_retail_prod"

---
apiVersion: v1
kind: Secret
metadata:
  name: pwc-retail-redis-secrets
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-platform
    app.kubernetes.io/component: redis-secrets
    app.kubernetes.io/version: "1.0.0"
type: Opaque
stringData:
  REDIS_PASSWORD: "REPLACE_WITH_SECURE_REDIS_PASSWORD"
  REDIS_URL: "redis://:REPLACE_WITH_SECURE_REDIS_PASSWORD@redis-service:6379/0"

---
apiVersion: v1
kind: Secret
metadata:
  name: pwc-retail-airflow-secrets
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-platform
    app.kubernetes.io/component: airflow-secrets
    app.kubernetes.io/version: "1.0.0"
type: Opaque
stringData:
  AIRFLOW_WEBSERVER_SECRET_KEY: "REPLACE_WITH_SECURE_AIRFLOW_SECRET_KEY"
  AIRFLOW_ADMIN_USER: "admin"
  AIRFLOW_ADMIN_PASSWORD: "REPLACE_WITH_SECURE_AIRFLOW_PASSWORD"
  AIRFLOW_ADMIN_EMAIL: "admin@pwc-retail-platform.com"
  AIRFLOW_ADMIN_FIRSTNAME: "Admin"
  AIRFLOW_ADMIN_LASTNAME: "User"
  
  # Database Connection for Airflow
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql://admin:REPLACE_WITH_SECURE_DB_PASSWORD@postgres-service:5432/airflow"
  
  # Celery/Redis Connection for Airflow
  AIRFLOW__CELERY__BROKER_URL: "redis://:REPLACE_WITH_SECURE_REDIS_PASSWORD@redis-service:6379/1"
  AIRFLOW__CELERY__RESULT_BACKEND: "redis://:REPLACE_WITH_SECURE_REDIS_PASSWORD@redis-service:6379/1"

---
apiVersion: v1
kind: Secret
metadata:
  name: pwc-retail-spark-secrets
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-platform
    app.kubernetes.io/component: spark-secrets
    app.kubernetes.io/version: "1.0.0"
type: Opaque
stringData:
  # Spark History Server
  SPARK_HISTORY_OPTS: "-Dspark.history.fs.logDirectory=s3a://pwc-retail-spark-logs/history"
  
  # AWS S3 Configuration for Spark
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_AWS_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_AWS_SECRET_KEY"
  
  # Database Connection for Spark
  SPARK_DATABASE_URL: "jdbc:postgresql://postgres-service:5432/pwc_retail_prod"
  SPARK_DATABASE_USER: "admin"
  SPARK_DATABASE_PASSWORD: "REPLACE_WITH_SECURE_DB_PASSWORD"

---
apiVersion: v1
kind: Secret
metadata:
  name: pwc-retail-monitoring-secrets
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-platform
    app.kubernetes.io/component: monitoring-secrets
    app.kubernetes.io/version: "1.0.0"
type: Opaque
stringData:
  # Grafana Admin Credentials
  GF_SECURITY_ADMIN_USER: "admin"
  GF_SECURITY_ADMIN_PASSWORD: "REPLACE_WITH_SECURE_GRAFANA_PASSWORD"
  
  # AlertManager Configuration
  ALERTMANAGER_WEBHOOK_URL: "REPLACE_WITH_ALERTMANAGER_WEBHOOK_URL"
  
  # Prometheus Remote Write (if using external Prometheus)
  PROMETHEUS_REMOTE_WRITE_URL: "REPLACE_WITH_PROMETHEUS_REMOTE_WRITE_URL"
  PROMETHEUS_REMOTE_WRITE_USERNAME: "prometheus"
  PROMETHEUS_REMOTE_WRITE_PASSWORD: "REPLACE_WITH_PROMETHEUS_PASSWORD"

---
# TLS Certificates Secret
apiVersion: v1
kind: Secret
metadata:
  name: pwc-retail-tls-certs
  namespace: pwc-retail-data-platform-prod
  labels:
    app.kubernetes.io/name: pwc-retail-platform
    app.kubernetes.io/component: tls-certs
    app.kubernetes.io/version: "1.0.0"
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    # REPLACE WITH ACTUAL TLS CERTIFICATE
    # This should be obtained from a proper Certificate Authority
    # or generated using cert-manager in production
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    # REPLACE WITH ACTUAL PRIVATE KEY
    # This should be kept secure and rotated regularly
    -----END PRIVATE KEY-----

---
# External Secrets Operator Configuration (for production use)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: pwc-retail-vault-backend
  namespace: pwc-retail-data-platform-prod
spec:
  provider:
    vault:
      server: "https://vault.pwc-retail-platform.com"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "pwc-retail-platform"
          serviceAccountRef:
            name: external-secrets-service-account

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pwc-retail-external-secrets
  namespace: pwc-retail-data-platform-prod
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: pwc-retail-vault-backend
    kind: SecretStore
  target:
    name: pwc-retail-app-secrets-external
    creationPolicy: Owner
  data:
  - secretKey: DATABASE_PASSWORD
    remoteRef:
      key: pwc-retail/prod
      property: database_password
  - secretKey: SECRET_KEY
    remoteRef:
      key: pwc-retail/prod
      property: secret_key
  - secretKey: DATADOG_API_KEY
    remoteRef:
      key: pwc-retail/prod
      property: datadog_api_key
  - secretKey: AWS_ACCESS_KEY_ID
    remoteRef:
      key: pwc-retail/prod
      property: aws_access_key_id
  - secretKey: AWS_SECRET_ACCESS_KEY
    remoteRef:
      key: pwc-retail/prod
      property: aws_secret_access_key